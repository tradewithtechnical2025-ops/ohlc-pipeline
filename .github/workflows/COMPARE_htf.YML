name: Compare ER Filter (Mini HTF)

on:
  workflow_dispatch: {}

jobs:
  compare-er-filter:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install httpx

      - name: Run comparison
        env:
          WORKER_URL: ${{ secrets.WORKER_URL }}
          WORKER_TOKEN: ${{ secrets.WORKER_TOKEN }}
        run: python compare_er_filter.py --save dropped_by_er.json

      - name: Upload results as artifact
        uses: actions/upload-artifact@v4
        with:
          name: dropped-by-er
          path: dropped_by_er.json
          retention-days: 7
