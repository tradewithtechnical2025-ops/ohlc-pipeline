name: VCP Scan
on:
  workflow_dispatch:

jobs:
  vcp_scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install httpx
      - name: Print UTC Time
        run: |
          echo "UTC Time:"
          date -u
          echo "Runner Local Time:"
          date
      - name: Run VCP Scan
        env:
          UPSTOX_TOKEN:  ${{ secrets.UPSTOX_TOKEN }}
          WORKER_URL:    ${{ secrets.WORKER_URL }}
          WORKER_TOKEN:  ${{ secrets.WORKER_TOKEN }}
          FINEDGE_TOKEN: ${{ secrets.FINEDGE_TOKEN }}
        run: python pipeline.py vcp_scan
