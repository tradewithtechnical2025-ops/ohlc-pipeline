name: OHLC Comparison — Upstox vs R2

on:
  workflow_dispatch:
    inputs:
      days:
        description: "Lookback days (default: 30)"
        required: false
        default: "30"
      limit:
        description: "Max symbols to compare (leave blank = all)"
        required: false
        default: ""
      symbols:
        description: "Specific symbols e.g. RELIANCE TCS INFY (leave blank = all)"
        required: false
        default: ""

jobs:
  compare:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install httpx

      - name: Build CLI args
        id: args
        run: |
          ARGS="--days ${{ github.event.inputs.days }}"
          if [ -n "${{ github.event.inputs.limit }}" ]; then
            ARGS="$ARGS --limit ${{ github.event.inputs.limit }}"
          fi
          if [ -n "${{ github.event.inputs.symbols }}" ]; then
            ARGS="$ARGS --sym ${{ github.event.inputs.symbols }}"
          fi
          echo "cli_args=$ARGS" >> $GITHUB_OUTPUT

      - name: Run comparison
        env:
          UPSTOX_TOKEN: ${{ secrets.UPSTOX_TOKEN }}
          WORKER_URL:   ${{ secrets.WORKER_URL }}
          WORKER_TOKEN: ${{ secrets.WORKER_TOKEN }}
        run: python compare_ohlc.py ${{ steps.args.outputs.cli_args }}

      - name: Upload CSVs as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ohlc-comparison-${{ github.run_id }}
          path: |
            ohlc_comparison.csv
            ohlc_summary.csv
          retention-days: 7
