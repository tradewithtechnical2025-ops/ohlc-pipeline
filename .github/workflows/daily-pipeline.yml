name: TradeWithTech Pipeline

on:
  workflow_dispatch:        # sirf manual run (Actions tab se)

concurrency:
  group: twt-pipeline
  cancel-in-progress: false

# Module import pe pipeline.py ye 4 vars padhti hai -> sab jobs ko chahiye
env:
  PYTHON_VERSION: "3.11"
  UPSTOX_TOKEN:  ${{ secrets.UPSTOX_TOKEN }}
  WORKER_URL:    ${{ secrets.WORKER_URL }}
  WORKER_TOKEN:  ${{ secrets.WORKER_TOKEN }}
  FINEDGE_TOKEN: ${{ secrets.FINEDGE_TOKEN }}

jobs:
  classification:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - run: pip install httpx
      - run: python pipeline_classification.py classification          # classification*.json
  
  daily:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - run: pip install httpx
      - run: python pipeline.py daily          # prev-day OHLC -> ohlc_*.json

  today:
    needs: daily
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - run: pip install httpx
      - run: python pipeline.py today          # T+0 candle upsert -> ohlc_*.json

  hlr_scan:
    needs: today
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - run: pip install httpx
      - run: python pipeline.py hlr_scan        # -> hlr_signals.json + pullback_signals.json

  pattern_scan:
    needs: hlr_scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - run: pip install httpx
      - run: python pipeline.py pattern_scan    # -> pattern_signals.json  (ep_scan iski file padhta hai)

  fund_daily:
    needs: pattern_scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - run: pip install httpx
      - run: python pipeline.py fund_daily      # result stocks -> fundamentals.json + result_calendar.json (no results -> fast exit)

  ep_scan:
    needs: fund_daily
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - run: pip install httpx
      - run: python pipeline.py ep_scan         # reads hlr/pullback/pattern/fundamentals -> screener_feed.json + rs_ratings.json + ...
