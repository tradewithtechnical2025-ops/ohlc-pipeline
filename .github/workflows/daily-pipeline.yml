name: TradeWithTech Pipeline

on:
  schedule:
    # 4:10 PM IST = 10:40 UTC, Mon–Fri (NSE trading days)
    - cron: "40 10 * * 1-5"
  workflow_dispatch:        # manual run from Actions tab

# Cancel a stale run if a new one starts
concurrency:
  group: twt-pipeline
  cancel-in-progress: false

# Defined ONCE here -> inherited by every job/step below.
env:
  PYTHON_VERSION: "3.11"
  UPSTOX_TOKEN:  ${{ secrets.UPSTOX_TOKEN }}
  WORKER_URL:    ${{ secrets.WORKER_URL }}
  WORKER_TOKEN:  ${{ secrets.WORKER_TOKEN }}
  FINEDGE_TOKEN: ${{ secrets.FINEDGE_TOKEN }}

jobs:
  fund_daily:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - run: pip install httpx
      - run: python pipeline.py fund_daily

  hlr_scan:
    needs: fund_daily
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - run: pip install httpx
      - run: python pipeline.py hlr_scan

  pattern_scan:
    needs: hlr_scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - run: pip install httpx
      - run: python pipeline.py pattern_scan

  ep_scan:
    needs: pattern_scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - run: pip install httpx
      - run: python pipeline.py ep_scan

  today:
    needs: ep_scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - run: pip install httpx
      - run: python pipeline.py today
