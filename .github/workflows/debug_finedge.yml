name: Debug Finedge CF Fields
on:
  workflow_dispatch:
env:
  FINEDGE_TOKEN: ${{ secrets.FINEDGE_TOKEN }}
jobs:
  debug_cf:
    name: Dump CF field names
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - run: pip install httpx
      - name: Fetch CF + BS + basic-financials raw response
        run: |
          python - <<'EOF'
          import asyncio, httpx, os, json

          TOKEN  = os.environ["FINEDGE_TOKEN"]
          BASE   = "https://data.finedgeapi.com/api/v1"
          SYMBOL = "ITC"

          async def get(client, path, extra_params={}):
              params = {"token": TOKEN, **extra_params}
              r = await client.get(f"{BASE}/{path}", params=params, timeout=20)
              print(f"\n{'='*60}")
              print(f"  GET /{path}  params={extra_params}  → {r.status_code}")
              if r.status_code == 200 and r.text.strip():
                  try:
                      d = r.json()
                      # financials endpoint
                      rows = d.get("financials") or d.get("ratios") or []
                      if rows:
                          print(f"  rows count : {len(rows)}")
                          print(f"  keys       : {sorted(rows[0].keys())}")
                          # Print first row values (non-null)
                          sample = {k: v for k, v in rows[0].items() if v is not None}
                          print(f"  non-null   : {json.dumps(sample, indent=4)[:800]}")
                      else:
                          print(f"  top keys   : {sorted(d.keys())}")
                          print(f"  body       : {json.dumps(d)[:400]}")
                  except Exception as e:
                      print(f"  parse err  : {e}")
                      print(f"  raw        : {r.text[:400]}")
              else:
                  print(f"  body       : {r.text[:300] or '(empty)'}")

          async def main():
              async with httpx.AsyncClient() as client:

                  # ── 1. CF consolidated ─────────────────────────────────
                  await get(client, f"financials/{SYMBOL}",
                            {"statement_type": "c", "statement_code": "cf", "period": "annual"})

                  # ── 2. CF standalone (fallback) ────────────────────────
                  await get(client, f"financials/{SYMBOL}",
                            {"statement_type": "s", "statement_code": "cf", "period": "annual"})

                  # ── 3. CF quarterly ────────────────────────────────────
                  await get(client, f"financials/{SYMBOL}",
                            {"statement_type": "c", "statement_code": "cf", "period": "quarterly"})

                  # ── 4. basic-financials (check eps/bvps/netDebt keys) ──
                  await get(client, f"basic-financials/{SYMBOL}",
                            {"statement_type": "c", "statement_code": "pl"})

                  # ── 5. BS — verify book value fields ──────────────────
                  await get(client, f"financials/{SYMBOL}",
                            {"statement_type": "c", "statement_code": "bs", "period": "annual"})

                  # ── 6. Shareholding — verify category names ────────────
                  await get(client, f"shareholdings/pattern/{SYMBOL}",
                            {"period": "quarterly"})

          asyncio.run(main())
          EOF
