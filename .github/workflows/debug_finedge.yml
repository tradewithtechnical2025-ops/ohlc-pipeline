name: Debug Finedge Token Format

on:
  workflow_dispatch:

env:
  FINEDGE_TOKEN: ${{ secrets.FINEDGE_TOKEN }}

jobs:
  debug_token:
    name: Test token formats
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - run: pip install httpx

      - name: Test token formats
        run: |
          python - <<'EOF'
          import asyncio
          import httpx
          import os

          TOKEN  = os.environ["FINEDGE_TOKEN"]
          BASE   = "https://data.finedgeapi.com/api/v1"
          SYMBOL = "ITC"

          async def test(client, name, url, headers={}):
              r = await client.get(url, headers=headers, timeout=15)
              print(f"\n{'='*50}")
              print(f"  {name}")
              print(f"  Status : {r.status_code}")
              print(f"  Body   : {r.text[:300] or '(empty)'}")

          async def main():
              async with httpx.AsyncClient() as client:
                  url = f"{BASE}/historical-adjusted-price/{SYMBOL}"
                  await test(client, "Token as query ?token=",
                      f"{url}?token={TOKEN}")

                  await test(client, "Token as Bearer header",
                      url, {"Authorization": f"Bearer {TOKEN}"})

                  await test(client, "Token as X-API-Key header",
                      url, {"X-API-Key": TOKEN})

                  await test(client, "Token as api-key header",
                      url, {"api-key": TOKEN})

                  await test(client, "Token as x-api-token header",
                      url, {"x-api-token": TOKEN})

                  await test(client, "Token as apikey header",
                      url, {"apikey": TOKEN})

                  # Also test results calendar with header
                  rc_url = f"{BASE}/results-calendar"
                  await test(client, "Results calendar + Bearer",
                      rc_url, {"Authorization": f"Bearer {TOKEN}"})

                  await test(client, "Results calendar + X-API-Key",
                      rc_url, {"X-API-Key": TOKEN})

          asyncio.run(main())
          EOF
