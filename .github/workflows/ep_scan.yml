name: EP Scan
on:
  workflow_dispatch:

jobs:
  ep_scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install httpx requests
      - name: Print UTC Time
        run: |
          echo "UTC Time:"
          date -u
          echo "Runner Local Time:"
          date
      - name: Run EP Scan
        env:
          UPSTOX_TOKEN:       ${{ secrets.UPSTOX_TOKEN }}
          WORKER_URL:         ${{ secrets.WORKER_URL }}
          WORKER_TOKEN:       ${{ secrets.WORKER_TOKEN }}
          FINEDGE_TOKEN:      ${{ secrets.FINEDGE_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python pipeline.py ep_scan

      - name: Telegram fallback on workflow failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          MSG="❌ <b>📊 EP Scan</b>%0AStatus : <code>WORKFLOW FAILURE</code>%0ATime : $(TZ='Asia/Kolkata' date '+%d %b %Y, %I:%M %p IST')%0A🔗 ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "parse_mode=HTML" \
            -d "text=${MSG}"
