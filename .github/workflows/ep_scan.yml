name: EP Scan

on:
  workflow_dispatch:
  schedule:
    - cron: '45 10 * * 1-5'   # 4:15 PM IST

jobs:
  ep_scan:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install httpx

      - name: Run EP Scan
        env:
          UPSTOX_TOKEN: ${{ secrets.UPSTOX_TOKEN }}
          WORKER_URL:   ${{ secrets.WORKER_URL }}
          WORKER_TOKEN: ${{ secrets.WORKER_TOKEN }}
        run: python pipeline.py ep_scan
