name: Fundamentals Daily

on:
  schedule:
    # 6:00 PM IST = 12:30 UTC (weekdays only)
    - cron: '30 12 * * 1-5'
  workflow_dispatch:   # manual trigger from Actions tab

jobs:
  fund-daily:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - name: Install dependencies
        run: pip install httpx
      - name: Run fundamentals daily update
        run: python pipeline.py fund_daily
        env:
          UPSTOX_TOKEN: ${{ secrets.UPSTOX_TOKEN }}
          WORKER_URL:   ${{ secrets.WORKER_URL }}
          WORKER_TOKEN: ${{ secrets.WORKER_TOKEN }}
