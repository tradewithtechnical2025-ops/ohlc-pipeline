name: Fundamentals Weekly Part 1

on:
  schedule:
    # 12:00 AM IST Sun
    - cron: '30 18 * * 6'
  workflow_dispatch:

jobs:
  fund-weekly-1:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - name: Install dependencies
        run: pip install httpx
      - name: Run fundamentals weekly part 1
        run: python pipeline.py fund_weekly_1
        env:
          UPSTOX_TOKEN: ${{ secrets.UPSTOX_TOKEN }}
          WORKER_URL:   ${{ secrets.WORKER_URL }}
          WORKER_TOKEN: ${{ secrets.WORKER_TOKEN }}
