name: HLR Scan
on:
  workflow_dispatch:
  schedule:
    - cron: '50 10 * * 1-5'   # 4:20 PM IST
jobs:
  hlr_scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install httpx
      - name: Run HLR Scan
        env:
          UPSTOX_TOKEN: ${{ secrets.UPSTOX_TOKEN }}
          WORKER_URL:   ${{ secrets.WORKER_URL }}
          WORKER_TOKEN: ${{ secrets.WORKER_TOKEN }}
        run: python pipeline.py hlr_scan
