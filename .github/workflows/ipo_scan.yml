name: IPO Scan

on:
  schedule:
    - cron: '30 11 * * *'   # 5:00 PM IST daily
  workflow_dispatch:

jobs:
  ipo-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - run: pip install httpx
      - name: Run IPO scan
        env:
          UPSTOX_TOKEN: ${{ secrets.UPSTOX_TOKEN }}
          WORKER_URL:   ${{ secrets.WORKER_URL }}
          WORKER_TOKEN: ${{ secrets.WORKER_TOKEN }}
        run: python pipeline_ipo.py
