name: MA Expansion Scan

on:
  schedule:
    # Runs at 4:00 PM IST (10:30 UTC) on weekdays, after market close.
    # Adjust to match when your OHLC data pipeline finishes updating.
    - cron: '30 10 * * 1-5'
  workflow_dispatch: {}   # allows manual trigger from GitHub Actions tab

permissions:
  contents: write   # needed so the job can push results back to the repo

jobs:
  run-ma-expansion-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install httpx

      - name: Run MA expansion scanner
        run: python ma_expansion_scanner.py --save ma_expansion_results.json --r2-key ma_expansion_results.json
        env:
          WORKER_URL: ${{ secrets.WORKER_URL }}
          WORKER_TOKEN: ${{ secrets.WORKER_TOKEN }}

      - name: Upload results as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ma-expansion-results
          path: ma_expansion_results.json
