name: Live OHLC Pipeline

on:
  schedule:
    # Every 3 min, Mon–Fri, 9:15 AM to 3:30 PM IST
    # IST = UTC+5:30, so 9:15 IST = 3:45 UTC, 3:30 PM IST = 10:00 UTC
    - cron: "45,48,51,54,57 3 * * 1-5"
    - cron: "0,3,6,9,12,15,18,21,24,27,30,33,36,39,42,45,48,51,54,57 4-9 * * 1-5"
    - cron: "0,3,6,9,12,15,18,21,24,27,30,33,36,39,42,45,48,51,54,57 10 * * 1-5"
  workflow_dispatch:   # manual trigger bhi available

jobs:
  fetch-live-ohlc:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install aiohttp boto3

      - name: Run pipeline_live.py
        env:
          UPSTOX_TOKEN:  ${{ secrets.UPSTOX_TOKEN }}
          R2_ENDPOINT:   ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET:     ${{ secrets.R2_BUCKET }}
          R2_ACCESS_KEY: ${{ secrets.R2_ACCESS_KEY }}
          R2_SECRET_KEY: ${{ secrets.R2_SECRET_KEY }}
          MASTER_URL:    ${{ secrets.MASTER_URL }}
          IKEY_MAP_URL:  ${{ secrets.IKEY_MAP_URL }}
        run: python pipeline_live.py
