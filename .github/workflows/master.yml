```yaml
name: Master Pipeline

on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 1 * *'

jobs:
  master:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          pip install httpx

      - name: Run Master Pipeline
        env:
          FINEDGE_TOKEN: ${{ secrets.FINEDGE_TOKEN }}
          WORKER_URL: ${{ secrets.WORKER_URL }}
          WORKER_TOKEN: ${{ secrets.WORKER_TOKEN }}

        run: |
          python pipeline_master.py
```
