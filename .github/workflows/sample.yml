name: Debug CF Fields

on:
  workflow_dispatch:

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - run: pip install httpx
      - name: Get CF field names
        run: |
          python - <<'PYEOF'
          import httpx, os, json

          TOKEN = os.environ["FINEDGE_TOKEN"]
          BASE  = "https://data.finedgeapi.com/api/v1"

          # CF Annual
          r = httpx.get(f"{BASE}/financials/ITC", params={
              "statement_type": "c", "statement_code": "cf",
              "period": "annual", "token": TOKEN
          }, timeout=20)
          rows = r.json().get("financials", [])
          print("=== CF Annual keys ===")
          if rows:
              print(json.dumps(list(rows[0].keys()), indent=2))
              print("\nFirst row values (non-null only):")
              for k, v in rows[0].items():
                  if v not in (None, 0, ""):
                      print(f"  {k}: {v}")

          # BS Annual — book_value_ps aur net_debt ke liye
          r2 = httpx.get(f"{BASE}/basic-financials/ITC", params={
              "statement_type": "c", "statement_code": "bs", "token": TOKEN
          }, timeout=20)
          rows2 = r2.json().get("ratios", [])
          print("\n=== Basic Financials BS keys ===")
          if rows2:
              print(json.dumps(list(rows2[0].keys()), indent=2))
              print("\nFirst row:")
              print(json.dumps(rows2[0], indent=2))
          PYEOF
        env:
          FINEDGE_TOKEN: ${{ secrets.FINEDGE_TOKEN }}
