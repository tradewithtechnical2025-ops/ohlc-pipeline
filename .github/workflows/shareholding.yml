name: Shareholding Pipeline
on:
  workflow_dispatch:
    inputs:
      symbols:
        description: "Optional: space-separated symbols to sync just these (e.g. JUSTDIAL RELIANCE). Leave blank for the full universe run."
        required: false
        default: ""
  schedule:
    # 1st day of every month
    - cron: "0 3 1 * *"
jobs:
  shareholding:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Dependencies
        run: |
          pip install httpx
      - name: Run Shareholding Pipeline
        env:
          FINEDGE_TOKEN: ${{ secrets.FINEDGE_TOKEN }}
          WORKER_URL: ${{ secrets.WORKER_URL }}
          WORKER_TOKEN: ${{ secrets.WORKER_TOKEN }}
        run: |
          if [ -n "${{ github.event.inputs.symbols }}" ]; then
            python pipeline_shareholding.py sync ${{ github.event.inputs.symbols }}
          else
            python pipeline_shareholding.py
          fi
