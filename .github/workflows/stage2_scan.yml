name: Stage 2 Scan (test)

on:
  workflow_dispatch: {}

jobs:
  stage2_scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install httpx

      - name: Run Stage 2 Scan
        env:
          UPSTOX_TOKEN:  ${{ secrets.UPSTOX_TOKEN }}
          WORKER_URL:    ${{ secrets.WORKER_URL }}
          WORKER_TOKEN:  ${{ secrets.WORKER_TOKEN }}
          FINEDGE_TOKEN: ${{ secrets.FINEDGE_TOKEN }}
        run: python pipeline.py stage2_scan
