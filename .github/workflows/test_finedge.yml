name: Test Finedge With Correct Params

on:
  workflow_dispatch:

env:
  FINEDGE_TOKEN: ${{ secrets.FINEDGE_TOKEN }}

jobs:
  test_params:
    name: Test with correct params
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - run: pip install httpx

      - name: Test with correct params
        run: |
          python - <<'EOF'
          import asyncio
          import httpx
          import os
          from datetime import date, timedelta

          TOKEN  = os.environ["FINEDGE_TOKEN"]
          BASE   = "https://data.finedgeapi.com/api/v1"
          SYMBOL = "ITC"
          TODAY  = date.today().isoformat()
          MONTH_AGO = (date.today() - timedelta(days=30)).isoformat()

          async def test(client, name, url):
              r = await client.get(url, timeout=15)
              status = r.status_code
              body   = r.text[:300] or "(empty)"
              icon   = "✅" if (r.status_code == 200 and r.text.strip()) else "❌"
              print(f"{icon} [{status}] {name}")
              if r.status_code != 200 or not r.text.strip():
                  print(f"       {body}")
              else:
                  print(f"       Keys: {list(__import__('json').loads(r.text).keys()) if r.text.startswith('{') else 'array len=' + str(len(__import__('json').loads(r.text)))}")

          async def main():
              async with httpx.AsyncClient() as client:
                  tests = [
                      # Ratios/Metrics need period param?
                      ("Ratios annual",            f"{BASE}/ratios/{SYMBOL}?period=annual&token={TOKEN}"),
                      ("Ratios quarterly",         f"{BASE}/ratios/{SYMBOL}?period=quarterly&token={TOKEN}"),
                      ("Ratios ttm",               f"{BASE}/ratios/{SYMBOL}?period=ttm&token={TOKEN}"),
                      ("Financial Metrics annual", f"{BASE}/financial-metrics/{SYMBOL}?period=annual&token={TOKEN}"),
                      ("Financial Metrics qtr",    f"{BASE}/financial-metrics/{SYMBOL}?period=quarterly&token={TOKEN}"),
                      ("Basic Financials annual",  f"{BASE}/basic-financials/{SYMBOL}?period=annual&token={TOKEN}"),
                      ("Basic Financials qtr",     f"{BASE}/basic-financials/{SYMBOL}?period=quarterly&token={TOKEN}"),

                      # Price Ratios
                      ("Daily Price Ratios annual",f"{BASE}/daily-price-ratios/{SYMBOL}?period=annual&token={TOKEN}"),

                      # OHLC — maybe needs exchange param
                      ("OHLC NSE",                 f"{BASE}/historical-adjusted-price/{SYMBOL}?exchange=NSE&token={TOKEN}"),
                      ("OHLC BSE",                 f"{BASE}/historical-adjusted-price/{SYMBOL}?exchange=BSE&token={TOKEN}"),

                      # Shareholding — needs period
                      ("Shareholding quarterly",   f"{BASE}/shareholdings/pattern/{SYMBOL}?period=quarterly&token={TOKEN}"),
                      ("Shareholding annual",      f"{BASE}/shareholdings/pattern/{SYMBOL}?period=annual&token={TOKEN}"),

                      # Corp Announcements — needs date range
                      ("Corp Announcements",       f"{BASE}/corp-announcements?symbol={SYMBOL}&from_date={MONTH_AGO}&to_date={TODAY}&token={TOKEN}"),

                      # Holiday Calendar — needs year?
                      ("Holiday Calendar 2026",    f"{BASE}/holiday-calendar?year=2026&token={TOKEN}"),
                      ("Holiday Calendar exchange",f"{BASE}/holiday-calendar?exchange=NSE&token={TOKEN}"),

                      # Segment Revenue
                      ("Segment Revenue annual",   f"{BASE}/segment-revenue/{SYMBOL}?period=annual&token={TOKEN}"),
                      ("Segment Revenue qtr",      f"{BASE}/segment-revenue/{SYMBOL}?period=quarterly&token={TOKEN}"),
                  ]

                  for name, url in tests:
                      await test(client, name, url)
                      await asyncio.sleep(0.3)

              print("\nDone!")

          asyncio.run(main())
          EOF
