name: Test Finedge Final

on:
  workflow_dispatch:

env:
  FINEDGE_TOKEN: ${{ secrets.FINEDGE_TOKEN }}

jobs:
  test_final:
    name: Final test all endpoints
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - run: pip install httpx

      - name: Test all with correct params
        run: |
          python - <<'EOF'
          import asyncio
          import httpx
          import os
          import json
          from datetime import date, timedelta

          TOKEN    = os.environ["FINEDGE_TOKEN"]
          BASE     = "https://data.finedgeapi.com/api/v1"
          SYMBOL   = "ITC"
          TODAY    = date.today().isoformat()
          NEXT30   = (date.today() + timedelta(days=30)).isoformat()
          PREV7    = (date.today() - timedelta(days=7)).isoformat()
          MONTH_AGO= (date.today() - timedelta(days=30)).isoformat()

          async def test(client, name, url):
              r = await client.get(url, timeout=20)
              status = r.status_code
              has_data = r.status_code == 200 and r.text.strip()
              icon = "✅" if has_data else "❌"
              print(f"{icon} [{status}] {name}")
              if has_data:
                  try:
                      d = r.json()
                      if isinstance(d, dict):
                          keys = list(d.keys())
                          print(f"       Keys: {keys}")
                          for k in keys:
                              if isinstance(d[k], list):
                                  print(f"       [{k}] count={len(d[k])}")
                                  if len(d[k]) > 0:
                                      print(f"       sample: {json.dumps(d[k][0])[:200]}")
                                  break
                      elif isinstance(d, list):
                          print(f"       array count={len(d)}")
                          if len(d) > 0:
                              print(f"       sample: {json.dumps(d[0])[:200]}")
                  except:
                      print(f"       {r.text[:200]}")
              else:
                  print(f"       {r.text[:200] or '(empty)'}")

          async def main():
              async with httpx.AsyncClient() as client:
                  tests = [
                      # ── Price ─────────────────────────────────────────
                      ("OHLC (daily-quotes, all years)",
                          f"{BASE}/daily-quotes/{SYMBOL}?token={TOKEN}"),
                      ("OHLC (daily-quotes, 2024-2026)",
                          f"{BASE}/daily-quotes/{SYMBOL}?from=2024&to=2026&token={TOKEN}"),
                      ("Daily Quote (today)",
                          f"{BASE}/daily-quotes/{SYMBOL}?from=2026&to=2026&token={TOKEN}"),
                      ("Quote",
                          f"{BASE}/quote?symbol={SYMBOL}&token={TOKEN}"),

                      # ── Price Ratios ───────────────────────────────────
                      ("Annual Price Ratios",
                          f"{BASE}/annual-price-ratios/{SYMBOL}?statement_type=c&token={TOKEN}"),
                      ("Daily Price Ratios",
                          f"{BASE}/daily-price-ratios/{SYMBOL}?statement_type=c&token={TOKEN}"),

                      # ── Financials ─────────────────────────────────────
                      ("Financials PL quarterly",
                          f"{BASE}/financials/{SYMBOL}?statement_type=c&statement_code=pl&period=quarterly&token={TOKEN}"),
                      ("Financials BS annual",
                          f"{BASE}/financials/{SYMBOL}?statement_type=c&statement_code=bs&period=annual&token={TOKEN}"),
                      ("Financials CF annual",
                          f"{BASE}/financials/{SYMBOL}?statement_type=c&statement_code=cf&period=annual&token={TOKEN}"),
                      ("Basic Financials PL",
                          f"{BASE}/basic-financials/{SYMBOL}?statement_type=c&statement_code=pl&token={TOKEN}"),
                      ("Basic Financials BS",
                          f"{BASE}/basic-financials/{SYMBOL}?statement_type=c&statement_code=bs&token={TOKEN}"),
                      ("Financial Metrics PL",
                          f"{BASE}/financial-metrics/{SYMBOL}?statement_type=c&statement_code=pl&token={TOKEN}"),
                      ("Ratios",
                          f"{BASE}/ratios/{SYMBOL}?statement_type=c&token={TOKEN}"),
                      ("Segment Revenue quarterly",
                          f"{BASE}/segment-revenue/{SYMBOL}?statement_type=c&statement_code=pl&period=quarterly&token={TOKEN}"),

                      # ── Company ────────────────────────────────────────
                      ("Company Profile",
                          f"{BASE}/company-profile/{SYMBOL}?token={TOKEN}"),
                      ("Peers",
                          f"{BASE}/peers/{SYMBOL}?token={TOKEN}"),

                      # ── Shareholding ───────────────────────────────────
                      ("Shareholding quarterly",
                          f"{BASE}/shareholdings/pattern/{SYMBOL}?period=quarterly&token={TOKEN}"),

                      # ── Corporate ──────────────────────────────────────
                      ("Corp Announcements",
                          f"{BASE}/corp-announcements?symbol={SYMBOL}&from_date={MONTH_AGO}&to_date={TODAY}&token={TOKEN}"),

                      # ── Exchange ───────────────────────────────────────
                      ("Results Calendar",
                          f"{BASE}/results-calendar?from_date={TODAY}&to_date={NEXT30}&token={TOKEN}"),
                      ("IPO Calendar",
                          f"{BASE}/ipo-calendar?token={TOKEN}"),
                      ("Index Master",
                          f"{BASE}/index/master?token={TOKEN}"),
                  ]

                  for name, url in tests:
                      await test(client, name, url)
                      await asyncio.sleep(0.4)

              print("\n✅ Done!")

          asyncio.run(main())
          EOF
