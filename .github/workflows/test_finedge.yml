name: Test Finedge API

on:
  workflow_dispatch:

env:
  FINEDGE_TOKEN: ${{ secrets.FINEDGE_TOKEN }}

jobs:
  test_finedge:
    name: Test all Finedge endpoints
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - run: pip install httpx

      - name: Test Finedge endpoints
        run: |
          python - <<'EOF'
          import asyncio
          import httpx
          import os
          import json

          TOKEN   = os.environ["FINEDGE_TOKEN"]
          BASE    = "https://data.finedgeapi.com/api/v1"
          SYMBOL  = "ITC"

          async def test(client, name, url):
              try:
                  r = await client.get(url, timeout=15)
                  data = r.json()
                  print(f"\n{'='*50}")
                  print(f"✅ {name}")
                  print(f"   Status : {r.status_code}")
                  if isinstance(data, dict):
                      keys = list(data.keys())
                      print(f"   Keys   : {keys}")
                      # Show first item of first list key
                      for k in keys:
                          if isinstance(data[k], list) and len(data[k]) > 0:
                              print(f"   [{k}] count : {len(data[k])}")
                              print(f"   Sample : {json.dumps(data[k][0], indent=2)[:300]}")
                              break
                  elif isinstance(data, list):
                      print(f"   Count  : {len(data)}")
                      if len(data) > 0:
                          print(f"   Sample : {json.dumps(data[0], indent=2)[:300]}")
              except Exception as e:
                  print(f"\n❌ {name} — ERROR: {e}")

          async def main():
              async with httpx.AsyncClient() as client:
                  endpoints = [
                      ("OHLC (Adjusted)",        f"{BASE}/historical-adjusted-price/{SYMBOL}?token={TOKEN}"),
                      ("Financials P&L quarterly", f"{BASE}/financials/{SYMBOL}?statement_type=c&statement_code=pl&period=quarterly&token={TOKEN}"),
                      ("Financials BS annual",    f"{BASE}/financials/{SYMBOL}?statement_type=c&statement_code=bs&period=annual&token={TOKEN}"),
                      ("Financials CF annual",    f"{BASE}/financials/{SYMBOL}?statement_type=c&statement_code=cf&period=annual&token={TOKEN}"),
                      ("Financial Ratios",        f"{BASE}/financial-ratios/{SYMBOL}?token={TOKEN}"),
                      ("Company Profile",         f"{BASE}/company/{SYMBOL}?token={TOKEN}"),
                      ("Results Calendar",        f"{BASE}/exchange/results-calendar?token={TOKEN}"),
                      ("Holiday Calendar",        f"{BASE}/exchange/holiday-calendar?token={TOKEN}"),
                      ("Shareholding",            f"{BASE}/shareholdings/{SYMBOL}?token={TOKEN}"),
                      ("Corporate Actions",       f"{BASE}/corporate-actions/{SYMBOL}?token={TOKEN}"),
                  ]

                  for name, url in endpoints:
                      await test(client, name, url)
                      await asyncio.sleep(0.5)

          asyncio.run(main())
          EOF
