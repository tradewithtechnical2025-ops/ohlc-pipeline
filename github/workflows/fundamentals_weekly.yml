name: Fundamentals Weekly

on:
  schedule:
    # Sunday 6:00 AM IST = Saturday 00:30 UTC
    - cron: '30 0 * * 0'
  workflow_dispatch:   # manual trigger from Actions tab

jobs:
  fund-weekly:
    runs-on: ubuntu-latest
    timeout-minutes: 360   # 6 hours — 2300 stocks ke liye enough
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - name: Install dependencies
        run: pip install httpx
      - name: Run fundamentals weekly full refresh
        run: python pipeline.py fund_weekly
        env:
          UPSTOX_TOKEN: ${{ secrets.UPSTOX_TOKEN }}
          WORKER_URL:   ${{ secrets.WORKER_URL }}
          WORKER_TOKEN: ${{ secrets.WORKER_TOKEN }}
